; BeamMeUp keyboard-dongle firmware — ESP32-S3-DevKitC-1 (N32R16V).
; Versions are pinned so `pio run -t upload` builds reproducibly without an
; IDE (mirrors how the repo pins pnpm). The N32R16V has 32 MB flash; the
; stock 8 MB board definition is fine for this tiny firmware.

[env:esp32-s3-devkitc-1]
platform = espressif32@6.9.0
board = esp32-s3-devkitc-1
framework = arduino
lib_deps =
    h2zero/NimBLE-Arduino@1.4.3
build_flags =
    ; Native USB CDC as `Serial` (the port labeled "USB" on the DevKitC-1).
    ; BLE HID rides the radio, so USB and HID never contend (design §2.2).
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    ; Inter-key pacing; override here while tuning bring-up (design §9),
    ; e.g. -DKEY_DELAY_MS=4
monitor_speed = 115200
