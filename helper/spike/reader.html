<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Beam Me Up ARQ BLE Spike</title>
  <style>
    body {
      margin: 0;
      padding: 24px;
      background: #0b1014;
      color: #e5f7ff;
      font: 15px/1.45 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    button {
      border: 1px solid #34d5ff;
      border-radius: 6px;
      background: #072431;
      color: #e5f7ff;
      padding: 10px 14px;
      font: inherit;
      cursor: pointer;
    }
    button:disabled {
      opacity: 0.55;
      cursor: default;
    }
    pre {
      min-height: 280px;
      margin-top: 18px;
      padding: 14px;
      overflow: auto;
      border: 1px solid #21313a;
      border-radius: 6px;
      background: #05090c;
      color: #b7f1ff;
      white-space: pre-wrap;
    }
  </style>
</head>
<body>
  <button id="connect">Connect</button>
  <pre id="log"></pre>

  <script>
    const SERVICE_UUID = '0000fff0-0000-1000-8000-00805f9b34fb'
    const CHARACTERISTIC_UUID = '0000fff1-0000-1000-8000-00805f9b34fb'
    const connectButton = document.getElementById('connect')
    const logEl = document.getElementById('log')
    let lastAt = 0

    function log(line) {
      logEl.textContent += `${new Date().toISOString()} ${line}\n`
      logEl.scrollTop = logEl.scrollHeight
    }

    connectButton.addEventListener('click', async () => {
      connectButton.disabled = true
      try {
        if (!navigator.bluetooth) throw new Error('Web Bluetooth is not available in this browser')
        const device = await navigator.bluetooth.requestDevice({
          acceptAllDevices: true,
          optionalServices: [SERVICE_UUID]
        })
        log(`device=${device.name || device.id}`)
        device.addEventListener('gattserverdisconnected', () => {
          log('disconnected')
          connectButton.disabled = false
        })
        const server = await device.gatt.connect()
        const service = await server.getPrimaryService(SERVICE_UUID)
        const characteristic = await service.getCharacteristic(CHARACTERISTIC_UUID)
        characteristic.addEventListener('characteristicvaluechanged', event => {
          const view = event.target.value
          const bytes = new Uint8Array(view.buffer, view.byteOffset, view.byteLength)
          const now = performance.now()
          const gap = lastAt ? `${Math.round(now - lastAt)}ms since previous` : 'first notification'
          lastAt = now
          const value = bytes.length >= 4 ? view.getUint32(0, false) : Array.from(bytes).join(',')
          log(`bytes=${bytes.length} value=${value} latency=${gap}`)
        })
        await characteristic.startNotifications()
        log('notifications started')
        log('MTU is not exposed by Web Bluetooth; use the largest reliable notification payload observed here for Phase 2 sizing.')
      } catch (err) {
        log(`error: ${err.message}`)
        connectButton.disabled = false
      }
    })
  </script>
</body>
</html>
