; BeamMeUp keyboard-dongle firmware — ESP32-S3 boards.
; Versions are pinned so `pio run -t upload` builds reproducibly without an
; IDE (mirrors how the repo pins pnpm).

[platformio]
default_envs = seeed_xiao_esp32s3

[env]
platform = espressif32@6.9.0
framework = arduino
lib_deps =
    h2zero/NimBLE-Arduino@1.4.3
build_flags =
    ; Native USB CDC as `Serial`. BLE HID rides the radio, so USB and HID
    ; never contend (design §2.2).
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    ; Inter-key pacing; override here while tuning bring-up (design §9),
    ; e.g. -DKEY_DELAY_MS=4
monitor_speed = 115200

; Seeed XIAO ESP32S3 — the board in hand (2026-07-18). Its only USB-C port
; is the S3's native USB, so the CDC flags above are all it needs.
[env:seeed_xiao_esp32s3]
board = seeed_xiao_esp32s3
; The pinned esptool 4.5.1 stub dies talking to the S3's USB-JTAG/serial on
; macOS ("No serial data received", both at the 460800 baud switch and at
; flash-chip detect with the baud pinned). The ROM loader has no such issue,
; so flash with --no-stub; baud is virtual on native USB, 115200 costs
; nothing. upload_flags can't express this (--no-stub must precede the
; write_flash subcommand), hence the full custom command.
upload_protocol = custom
upload_command = $PYTHONEXE $PROJECT_PACKAGES_DIR/tool-esptoolpy/esptool.py --chip esp32s3 --port $UPLOAD_PORT --baud 115200 --before default_reset --after hard_reset --no-stub write_flash -z 0x0 $BUILD_DIR/bootloader.bin 0x8000 $BUILD_DIR/partitions.bin 0xe000 $PROJECT_PACKAGES_DIR/framework-arduinoespressif32/tools/partitions/boot_app0.bin 0x10000 $BUILD_DIR/firmware.bin

; ESP32-S3-DevKitC-1 (N32R16V) — original target, kept selectable via
; `pio run -e esp32-s3-devkitc-1`. The N32R16V has 32 MB flash; the stock
; 8 MB board definition is fine for this tiny firmware. Flash via the port
; labeled "USB" (native USB).
[env:esp32-s3-devkitc-1]
board = esp32-s3-devkitc-1
